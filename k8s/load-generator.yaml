apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                wget -q -O- http://demo-api/compute/500000 > /dev/null 2>&1
              done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
